<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body onload="checkLogin(); loadProducts(); loadCategoryDropdown()"></body>

<div class="container mt-4">
<h3>Products</h3>

<input id="prodName" class="form-control mb-2" placeholder="Product Name">
<input id="prodPrice" class="form-control mb-2" placeholder="Price">

<select id="prodCat" class="form-control mb-2">
<option>Select Category</option>
</select>

<button class="btn btn-success" onclick="addProduct()">Add Product</button>

<input id="searchBox" class="form-control mt-3" placeholder="Search product..." onkeyup="searchProducts()">

<table class="table table-bordered mt-3 bg-white shadow">
<thead class="table-dark">
<tr>
<th>ID</th><th>Name</th><th>Price</th><th>Category</th><th>Action</th>
</tr>
</thead>
<tbody id="productTable"></tbody>
</table>

</div>

<script src="js/app.js"></script>
</body>
</html>
