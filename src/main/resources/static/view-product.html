<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h3 class="mb-3">📦 Product Details</h3>

        <p><b>ID:</b> <span th:text="${product.id}"></span></p>
        <p><b>Name:</b> <span th:text="${product.name}"></span></p>
        <p><b>Description:</b> <span th:text="${product.description}"></span></p>
        <p><b>Price:</b> ₹<span th:text="${product.price}"></span></p>
        <p><b>Category:</b> <span th:text="${product.category.name}"></span></p>

        <a href="/admin/products" class="btn btn-secondary">⬅ Back</a>

    </div>
</div>

</body>
</html>
